name: CI

on:
  push:
  pull_request:
  schedule:
    # Nightly lane (§Phase 8): the longer soak, the full include-ignored sweep, and
    # the fuzz battery — too slow for every push. 06:00 UTC daily.
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Unprivileged lane: builds, lints, and the WHOLE test suite — unit + property
  # tests AND the nexus-itest integration harness (design §5), which boots
  # serialnexusd/nexus-sim/serialnexusweb as subprocesses and drives them over the
  # control socket. `cargo test --workspace` builds every binary before running, so
  # the harness's bin() lookups resolve. The exec/envelope codec tests shell out to
  # python3, which the runner image provides. Runs on every push (§3). MSRV is pinned
  # to the development toolchain (the code uses let-chains freely); bump in lockstep
  # with the workspace Cargo.toml `rust-version`.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install 1.97 --profile minimal --component rustfmt,clippy
          rustup default 1.97
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # The minimal daemon build §8 supports (every built-in codec dropped) must
      # also be warning-clean — the registry-as-value path is easy to leave with an
      # unused binding when no codec is registered.
      - name: Clippy (minimal daemon, no built-in codecs)
        run: cargo clippy -p serialnexusd -p nexus-daemon --no-default-features --locked -- -D warnings
      - name: Test (unit + property + nexus-itest integration harness)
        run: cargo test --workspace --locked

  # The licensing gate proven, not assumed (§13). cargo-deny plus the nexus-itest test
  # that proves the gate rejects a banned crate (§16.11 folded the bash script into it;
  # it self-skips where cargo-deny is absent, so this job — which installs it — is where
  # it runs for real).
  license-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: License and ban check
        run: cargo deny check licenses bans sources
      - name: Prove the gate rejects a banned crate
        run: cargo test -p nexus-itest --test p0_license_gate --locked

  # Capability report (design §15.17): run every probe on the runner, assert the
  # platform expectation, and archive the Markdown so every capability claim has a
  # dated report behind it. `skipped(no adapter)` is a valid CI verdict. (The
  # no-unsupported assertion is ALSO covered by nexus-itest tests/meta_gates.rs; this
  # job additionally archives the human report.)
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Capability report
        run: |
          cargo run -q --locked -p nexus-doctor -- --markdown | tee nexus-doctor-report.md
          cargo run -q --locked -p nexus-doctor -- --json | jq -e -f expectations/linux.jq
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-doctor-report
          path: nexus-doctor-report.md

  # Out-of-tree codec template (§15.26 / plan §10.3): build the closed-repo stand-in
  # from the CONSUMER's own position (its own workspace manifest, path deps standing
  # in for version pins), run its conformance-kit test, and prove the custom daemon
  # serves its `acme` codec alongside the built-ins. §16.11 folded the bash script into
  # nexus-itest tests/p8_external_codec.rs, which now builds the excluded template itself
  # (the `check` job's `cargo test --workspace` also exercises it; this job keeps an
  # isolated stable-toolchain signal for the embedding pattern).
  external-codec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and exercise the out-of-tree template
        run: cargo test -p nexus-itest --test p8_external_codec --locked

  # macOS is best-effort (design §13). Now that the PTY node works on macOS (§7.2
  # slave-termios) and the harness is portable Rust, the macOS lane runs the SAME
  # `cargo test --workspace` as Linux: the serial-*device* tests self-skip (a pty is
  # not a serial device on macOS — serial2 → ENOTTY), while control-plane, pty,
  # codec, exec, leg, tap, and web tests all run. The doctor macos.jq gate is now a
  # REAL gate (P2 is `degraded`, not `unsupported`). Deltas documented in docs/macos.md.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq
        run: brew install jq
      - name: Build + test (portable core + integration harness; serial tests self-skip)
        run: cargo test --workspace --locked
      - name: Capability report + macos.jq gate
        run: |
          cargo run -q --locked -p nexus-doctor -- --markdown | tee nexus-doctor-macos.md
          cargo run -q --locked -p nexus-doctor -- --json | jq -e -f expectations/macos.jq
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-doctor-macos-report
          path: nexus-doctor-macos.md

  # Nightly soak (§Phase 8 item 2): the reference-topology data plane under sustained
  # synthetic load, asserting bounded RSS, allowlisted counters, zero faults, and a
  # final checksum reconciliation. The `#[ignore]`d endurance test, parameterized by
  # the same SOAK_* env knobs the bash used. A true 24-hour soak runs on dedicated
  # hardware before a release; CI runs a bounded slice.
  soak-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Soak (30 minutes)
        env:
          SOAK_SECONDS: '1800'
          SOAK_INTERVAL: '30'
        run: cargo test -p nexus-itest --locked --test p8_soak -- --ignored --nocapture

  # Nightly full sweep (post-1.0 §9.5, design §16.5): the complete suite INCLUDING the
  # #[ignore]d endurance/heavy tests — "a validation suite that only runs on the
  # author's machine is a reliability claim on the honor system." Now just the Rust
  # suite with ignored tests included; the exit code is the verdict.
  sweep-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Full suite including ignored (endurance/heavy)
        run: cargo test --workspace --locked -- --include-ignored

  # Nightly fuzzing (§Phase 8): the frame and envelope parsers, on top of the existing
  # proptest coverage. Needs a nightly toolchain and libFuzzer.
  fuzz-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        run: rustup toolchain install nightly --profile minimal && rustup default nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        working-directory: fuzz
        run: cargo +nightly fuzz build
      - name: Fuzz each target briefly
        working-directory: fuzz
        run: |
          for t in envelope_decode frame_decoder wire_hello reference_demux; do
            echo "=== fuzzing $t ==="
            cargo +nightly fuzz run "$t" -- -max_total_time=60 -rss_limit_mb=4096
          done
