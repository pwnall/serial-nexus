name: CI

on:
  push:
  pull_request:
  schedule:
    # Nightly lane (§Phase 8): the longer soak and the fuzz battery, which are too
    # slow for every push. 06:00 UTC daily.
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Unprivileged lane: builds, lints, unit/property tests, license gate.
  # Runs on every push (§3). MSRV is pinned to edition-2024's floor.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install 1.85 --profile minimal --component rustfmt,clippy
          rustup default 1.85
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked

  # The licensing gate proven, not assumed (§13, phase 0 validation).
  license-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: License and ban check
        run: cargo deny check licenses bans sources
      - name: Prove the gate rejects a banned crate
        run: bash scripts/validate/phase0/license-gate.sh

  # Harness hygiene (post-1.0 §9.4, design §16.5): shellcheck every validation
  # script, run the jq-lint, and run the assertion-helper self-test (which pins the
  # soak's jq-precedence tautology dead). Fast — no workspace build.
  harness-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck and jq
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq
      - name: shellcheck the validation scripts
        run: find scripts -name '*.sh' -print0 | xargs -0 shellcheck
      - name: jq-lint
        run: bash scripts/validate/phase0/jq-lint.sh
      - name: Assertion-helper self-test
        run: bash scripts/validate/phase0/harness-selftest.sh

  # Capability report (design §15.17): run every probe on the runner, assert the
  # platform expectation, and archive the Markdown so every capability claim has
  # a dated report behind it. `skipped(no adapter)` is a valid CI verdict.
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Capability report
        run: |
          cargo run -q --locked -p nexus-doctor -- --markdown | tee nexus-doctor-report.md
          cargo run -q --locked -p nexus-doctor -- --json | jq -e -f expectations/linux.jq
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-doctor-report
          path: nexus-doctor-report.md

  # Kernel-facing integration lane: the phase validation scripts that need real
  # PTYs and Unix sockets. Unprivileged; the privileged/nightly lanes are added
  # as their phases land.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Run validation scripts (through phase 3)
        run: bash scripts/validate/all.sh --through 3
      # The phase-8 release gates are deterministic, so they run per-push here. The
      # full --through 8 sweep stays out of per-push CI to keep it lean (the heavy
      # phase-3 firehose/benchmark and multi-daemon topologies run in the local suite).
      - name: Phase 8 release gates (quickstart, agent-task, soak smoke)
        run: |
          bash scripts/validate/phase8/quickstart.sh
          bash scripts/validate/phase8/agent-task.sh
          SOAK_SECONDS=6 bash scripts/validate/phase8/soak.sh

  # macOS is best-effort (design §13): the GATING deliverable is that the workspace
  # BUILDS and the portable property/unit tests pass; the doctor report and the
  # phase-2 e2e run informationally (poll-only observation path), since EXTPROC and
  # the by-id/counter mechanisms are Linux-only. Deltas are documented in docs/macos.md.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq
        run: brew install jq
      - name: Build (the macOS portability gate)
        run: cargo build --workspace --locked
      - name: Test the portable core (pure logic, property tests)
        run: cargo test --locked -p nexus-core -p codec-api -p codec-reference -p nexus-rpc
      - name: Capability report (informational — macOS is best-effort)
        continue-on-error: true
        run: |
          cargo run -q --locked -p nexus-doctor -- --markdown | tee nexus-doctor-macos.md
          cargo run -q --locked -p nexus-doctor -- --json | jq -e -f expectations/macos.jq
      - name: Phase 2 e2e on the poll-only path (informational)
        continue-on-error: true
        run: bash scripts/validate/phase2/data-path.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-doctor-macos-report
          path: nexus-doctor-macos.md

  # Nightly soak (§Phase 8 item 2): the reference-topology data plane under sustained
  # synthetic load, asserting bounded RSS, allowlisted counters, zero faults, and a
  # final checksum reconciliation. A true 24-hour soak runs on dedicated hardware
  # before a release; CI runs a substantial bounded slice within the runner's limits.
  soak-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Soak (30 minutes)
        run: SOAK_SECONDS=1800 SOAK_INTERVAL=30 bash scripts/validate/phase8/soak.sh

  # Nightly full sweep (post-1.0 §9.5, design §16.5): the complete deterministic
  # `--through 8` validation suite, promoted from local-only to CI — "a validation
  # suite that only runs on the author's machine is a reliability claim on the honor
  # system." Its aggregated verdict JSON is archived as the run's evidence.
  sweep-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jq, shellcheck, cargo-deny
        run: |
          sudo apt-get update && sudo apt-get install -y jq shellcheck
          cargo install cargo-deny --locked
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Full deterministic sweep (--through 8)
        run: bash scripts/validate/all.sh --through 8 --json-summary sweep-verdicts.json
      - name: Assert the sweep passed
        run: jq -e '.failed == 0 and .total >= 42' sweep-verdicts.json
      - uses: actions/upload-artifact@v4
        with:
          name: sweep-verdicts
          path: sweep-verdicts.json

  # Nightly fuzzing (§Phase 8): the frame and envelope parsers, on top of the
  # existing proptest coverage. Needs a nightly toolchain and libFuzzer.
  fuzz-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        run: rustup toolchain install nightly --profile minimal && rustup default nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        working-directory: fuzz
        run: cargo +nightly fuzz build
      - name: Fuzz each target briefly
        working-directory: fuzz
        run: |
          for t in envelope_decode frame_decoder wire_hello reference_demux; do
            echo "=== fuzzing $t ==="
            cargo +nightly fuzz run "$t" -- -max_total_time=60 -rss_limit_mb=4096
          done
